<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PARASENS logo – square">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&amp;display=swap');
    </style>

    <linearGradient id="parasensGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="25%" stop-color="#B3B3B3"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="75%" stop-color="#999999"/>
      <stop offset="100%" stop-color="#F2F2F2"/>
    </linearGradient>

    <radialGradient id="orb1" cx="50%" cy="0%" rx="50%" ry="40%">
      <stop offset="0%" stop-color="hsla(260, 80%, 8%, 0.6)"/>
      <stop offset="50%" stop-color="hsla(260, 80%, 8%, 0)"/>
    </radialGradient>
    <radialGradient id="orb2" cx="10%" cy="30%" rx="40%" ry="25%">
      <stop offset="0%" stop-color="hsla(280, 70%, 12%, 0.5)"/>
      <stop offset="45%" stop-color="hsla(280, 70%, 12%, 0)"/>
    </radialGradient>
    <radialGradient id="orb3" cx="90%" cy="20%" rx="30%" ry="20%">
      <stop offset="0%" stop-color="hsla(220, 60%, 10%, 0.4)"/>
      <stop offset="45%" stop-color="hsla(220, 60%, 10%, 0)"/>
    </radialGradient>
    <radialGradient id="orb4" cx="75%" cy="75%" rx="35%" ry="30%">
      <stop offset="0%" stop-color="hsla(300, 50%, 10%, 0.45)"/>
      <stop offset="50%" stop-color="hsla(300, 50%, 10%, 0)"/>
    </radialGradient>
    <radialGradient id="orb5" cx="5%" cy="85%" rx="25%" ry="25%">
      <stop offset="0%" stop-color="hsla(240, 60%, 8%, 0.5)"/>
      <stop offset="45%" stop-color="hsla(240, 60%, 8%, 0)"/>
    </radialGradient>
    <radialGradient id="orb6" cx="50%" cy="50%" rx="20%" ry="18%">
      <stop offset="0%" stop-color="hsla(270, 40%, 6%, 0.3)"/>
      <stop offset="50%" stop-color="hsla(270, 40%, 6%, 0)"/>
    </radialGradient>

    <radialGradient id="orbS1" cx="20%" cy="60%" rx="21%" ry="21%">
      <stop offset="0%" stop-color="hsla(260, 50%, 15%, 0.25)"/>
      <stop offset="70%" stop-color="hsla(260, 50%, 15%, 0)"/>
    </radialGradient>
    <radialGradient id="orbS2" cx="80%" cy="40%" rx="16%" ry="16%">
      <stop offset="0%" stop-color="hsla(200, 40%, 12%, 0.2)"/>
      <stop offset="70%" stop-color="hsla(200, 40%, 12%, 0)"/>
    </radialGradient>
    <radialGradient id="orbS3" cx="60%" cy="90%" rx="13%" ry="13%">
      <stop offset="0%" stop-color="hsla(280, 45%, 10%, 0.25)"/>
      <stop offset="70%" stop-color="hsla(280, 45%, 10%, 0)"/>
    </radialGradient>

    <radialGradient id="vignette" cx="50%" cy="50%" rx="35%" ry="35%">
      <stop offset="20%" stop-color="transparent"/>
      <stop offset="100%" stop-color="hsla(0, 0%, 0%, 0.4)"/>
    </radialGradient>

    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="greyNoise"/>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="#0A0A0A"/>

  <rect width="1080" height="1080" fill="url(#orb1)"/>
  <rect width="1080" height="1080" fill="url(#orb2)"/>
  <rect width="1080" height="1080" fill="url(#orb3)"/>
  <rect width="1080" height="1080" fill="url(#orb4)"/>
  <rect width="1080" height="1080" fill="url(#orb5)"/>
  <rect width="1080" height="1080" fill="url(#orb6)"/>

  <rect width="1080" height="1080" fill="url(#orbS1)"/>
  <rect width="1080" height="1080" fill="url(#orbS2)"/>
  <rect width="1080" height="1080" fill="url(#orbS3)"/>

  <rect width="1080" height="1080" filter="url(#noise)" opacity="0.035"/>
  <rect width="1080" height="1080" fill="url(#vignette)"/>

  <text
    x="540"
    y="400"
    text-anchor="middle"
    fill="#8C8C8C"
    font-family="Syne, sans-serif"
    font-size="16"
    font-weight="400"
    letter-spacing="6"
  >
    MOOD MUSIC MANAGEMENT
  </text>

  <text
    x="540"
    y="570"
    text-anchor="middle"
    fill="url(#parasensGrad)"
    font-family="Syne, sans-serif"
    font-size="120"
    font-weight="800"
    letter-spacing="3"
  >
    PARASENS
  </text>

  <text
    x="540"
    y="670"
    text-anchor="middle"
    fill="#666666"
    font-family="Syne, sans-serif"
    font-size="20"
    font-weight="300"
    letter-spacing="5"
  >
    SET THE TONE
  </text>
</svg>
