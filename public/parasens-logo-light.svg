<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PARASENS logo – light background">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&amp;display=swap');
    </style>
    <linearGradient id="parasensGradDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="25%" stop-color="#333333"/>
      <stop offset="50%" stop-color="#111111"/>
      <stop offset="75%" stop-color="#3D3D3D"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>

  <!-- Light background for documents / white pages -->
  <rect width="1920" height="1080" fill="#FAFAFA"/>

  <text
    x="960"
    y="390"
    text-anchor="middle"
    fill="#999999"
    font-family="Syne, sans-serif"
    font-size="18"
    font-weight="400"
    letter-spacing="8"
  >
    MOOD MUSIC MANAGEMENT
  </text>

  <text
    x="960"
    y="580"
    text-anchor="middle"
    fill="url(#parasensGradDark)"
    font-family="Syne, sans-serif"
    font-size="180"
    font-weight="800"
    letter-spacing="4"
  >
    PARASENS
  </text>

  <text
    x="960"
    y="700"
    text-anchor="middle"
    fill="#777777"
    font-family="Syne, sans-serif"
    font-size="22"
    font-weight="300"
    letter-spacing="6"
  >
    SET THE TONE
  </text>
</svg>
